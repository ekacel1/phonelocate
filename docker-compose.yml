services:
  # Backend Node.js (Express + Multer) - port 3001
  phonelocate-backend:
    image: node:20-alpine
    container_name: phonelocate-backend
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - /root/phonelocate/backend:/app
      - phonelocate-uploads:/app/uploads
      - phonelocate-data:/app/data
    restart: unless-stopped
    network_mode: host

  # Frontend React (build statique servi par nginx) - port 3010
  phonelocate-frontend:
    image: nginx:alpine
    container_name: phonelocate-frontend
    volumes:
      - /root/phonelocate/dist:/usr/share/nginx/html:ro
      - /root/phonelocate/nginx-internal.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    network_mode: host
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phonelocate.rule=Host(`recharche.fr.creaite.art`)"
      - "traefik.http.routers.phonelocate.entrypoints=websecure"
      - "traefik.http.routers.phonelocate.tls=true"
      - "traefik.http.routers.phonelocate.tls.certresolver=letsencrypt"
      - "traefik.http.services.phonelocate.loadbalancer.server.port=3010"

volumes:
  phonelocate-uploads:
  phonelocate-data:
